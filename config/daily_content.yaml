# ============================================================
# daily_content.yaml — 毎日の動画テキスト設定
# ============================================================
# ここを編集するだけで動画のテキストが変わります。
#
# 【構成】
#   各アカウントに7日分（月〜日）のトピックを設定できます。
#   曜日で自動ローテーションされます。
#
# 【テキストの種類】
#   topic : 動画のテーマキーワード（フック文生成に使われます）
#   info  : 動画本文の箇条書き（「・」で始まる行を改行で区切る）
#
# ============================================================

