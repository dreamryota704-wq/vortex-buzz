name: 毎日動画生成

on:
  schedule:
    - cron: '0 20 * * *'  # 毎朝 05:00 JST（= UTC 20:00）
  workflow_dispatch:       # GitHub画面から手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write  # Releasesへのアップロードに必要

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: ffmpeg と日本語フォントをインストール
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt anthropic edge-tts

      - name: 今日の日付を取得
        id: date
        run: echo "today=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 素材を準備（なければテスト用を作成）
        run: |
          mkdir -p input/videos input/bgm
          if [ $(find input/videos -name "*.png" -o -name "*.jpg" -o -name "*.mp4" ! -name "dummy.mp4" 2>/dev/null | grep -v dummy | wc -l) -eq 0 ]; then
            ffmpeg -f lavfi -i color=c=0x1a1a2e:size=1080x1920:duration=20 \
              -r 30 -c:v libx264 -preset ultrafast \
              input/videos/test_material.mp4 -y 2>&1 | tail -2
          fi
          if [ $(find input/bgm -name "*.mp3" ! -name "dummy.mp3" -size +1k 2>/dev/null | wc -l) -eq 0 ]; then
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=stereo -t 20 \
              -c:a libmp3lame input/bgm/test_bgm.mp3 -y 2>&1 | tail -2
          fi

      - name: 動画を生成
        run: python auto_daily.py --count 3
        env:
          TZ: Asia/Tokyo
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}

      - name: GitHub Releasesに動画をアップロード
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.date.outputs.today }}"

          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "動画 $TAG" \
            --notes "自動生成動画 $TAG" \
            --prerelease

          RELEASE_BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"
          VIDEO_URLS_JSON="{}"

          for account_dir in output/$TAG/*/; do
            [ -d "$account_dir" ] || continue
            account=$(basename "$account_dir")
            i=1
            for mp4 in "$account_dir"*.mp4; do
              [ -f "$mp4" ] || continue
              asset_name="${account}_${TAG}_${i}.mp4"
              cp "$mp4" "/tmp/$asset_name"
              gh release upload "$TAG" "/tmp/$asset_name" --clobber
              VIDEO_URL="$RELEASE_BASE/$asset_name"
              echo "$account ($i): $VIDEO_URL"
              VIDEO_URLS_JSON=$(echo "$VIDEO_URLS_JSON" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          key = '${account}_${i}'
          d[key] = '$VIDEO_URL'
          print(json.dumps(d))
          ")
              i=$((i+1))
            done
          done
          echo "video_urls=$VIDEO_URLS_JSON" >> $GITHUB_OUTPUT

      - name: SheetsとDriveに記録
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.parse
          from pathlib import Path

          today = "${{ steps.date.outputs.today }}"
          video_urls = json.loads('${{ steps.release.outputs.video_urls }}')
          result_file = Path(f"logs/result_{today}.json")

          if not result_file.exists():
              print("result JSON not found, skipping Sheets log")
              exit(0)

          data = json.loads(result_file.read_text(encoding="utf-8"))
          webhook_url = os.environ.get("SHEETS_WEBHOOK_URL", "")

          for r in data.get("results", []):
              if r.get("status") != "ok":
                  continue
              account = r["account"]
              iteration = r.get("iteration", 1)
              slides = r.get("slides", [])
              def s(i): return slides[i] if i < len(slides) else ""
              video_key = f"{account}_{iteration}"

              payload = {
                  "date":      f"{today} (本{iteration})",
                  "account":   account,
                  "topic":     r.get("topic", ""),
                  "slide_1":   s(0),
                  "slide_2":   s(1),
                  "slide_3":   s(2),
                  "slide_4":   s(3),
                  "slide_5":   s(4),
                  "narration": r.get("narration", ""),
                  "video_url": video_urls.get(video_key, ""),
              }

              req_data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              req = urllib.request.Request(
                  webhook_url,
                  data=req_data,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      print(f"[{account}] Sheets記録: {resp.read().decode()}")
              except Exception as e:
                  print(f"[{account}] Sheets記録エラー: {e}")
          PYEOF

      - name: 動画を保存（30日間ダウンロード可能）
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-${{ steps.date.outputs.today }}
          path: output/${{ steps.date.outputs.today }}/
          retention-days: 30
