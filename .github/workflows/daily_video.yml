name: 毎日動画生成

on:
  schedule:
    - cron: '0 20 * * *'  # 毎朝5:00 JST（= UTC 20:00）
  workflow_dispatch:       # GitHub画面から手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: ffmpeg と日本語フォントをインストール
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt google-auth google-auth-httplib2 google-api-python-client

      - name: 今日の日付を取得
        id: date
        run: echo "today=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 素材動画を準備（なければテスト用を作成）
        run: |
          mkdir -p input/videos input/bgm
          if [ $(find input/videos -name "*.mp4" ! -name "dummy.mp4" -size +0c | wc -l) -eq 0 ]; then
            echo "素材動画がないのでテスト用を生成します..."
            ffmpeg -f lavfi -i color=c=black:size=1080x1920:duration=15 \
              -r 30 -c:v libx264 -preset ultrafast \
              input/videos/test_material.mp4 -y 2>&1 | tail -3
            echo "✅ テスト動画作成完了"
          else
            echo "✅ 素材動画あり"
          fi
          if [ $(find input/bgm -name "*.mp3" ! -name "dummy.mp3" -size +0c | wc -l) -eq 0 ]; then
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=stereo -t 15 \
              -c:a libmp3lame input/bgm/test_bgm.mp3 -y 2>&1 | tail -3
          fi

      - name: 動画を生成
        run: python auto_daily.py

      - name: 動画を保存（30日間ダウンロード可能）
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-${{ steps.date.outputs.today }}
          path: output/${{ steps.date.outputs.today }}/
          retention-days: 30
